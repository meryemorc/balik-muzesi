<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Balık Müzesi AR</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: Arial, sans-serif;
        min-height: 100vh;
        background: linear-gradient(180deg, #001f3f 0%, #0077b6 60%, #00b4d8 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        text-align: center;
        padding: 24px;
      }
      .logo { font-size: 80px; margin-bottom: 16px; }
      h1 { font-size: 28px; margin-bottom: 8px; }
      .alt-baslik { font-size: 14px; color: #caf0f8; margin-bottom: 48px; max-width: 280px; line-height: 1.6; }
      .buton-grup { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 300px; }
      .btn { padding: 18px 24px; border-radius: 16px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 12px; text-decoration: none; }
      .btn-ikon { font-size: 32px; }
      .btn-metin { text-align: left; }
      .btn-metin span { display: block; font-size: 12px; font-weight: normal; opacity: 0.85; margin-top: 2px; }
      .btn-serbest { background: #ff6b35; color: white; }
      .btn-okut { background: rgba(255,255,255,0.15); color: white; border: 2px solid rgba(255,255,255,0.3) !important; }
      .btn-quiz { background: linear-gradient(135deg, #0096c7, #023e8a); color: white; border: 2px solid #90e0ef !important; }
      .alt-yazi { margin-top: 40px; font-size: 11px; color: #90e0ef; opacity: 0.7; }
    </style>
  </head>
  <body>
    <div class="logo">🐠</div>
    <h1>Balık Müzesi AR</h1>
    <p class="alt-baslik">ELSAM Balık Müzesi'ne hoş geldiniz. Denizin derinliklerini keşfedin!</p>

    <div class="buton-grup">
      <a href="serbest.html" class="btn btn-serbest">
        <span class="btn-ikon">🌊</span>
        <div class="btn-metin">Serbest AR <span>Balıklar ekranda serbest yüzsün</span></div>
      </a>
      <a href="okut.html" class="btn btn-okut">
        <span class="btn-ikon">📖</span>
        <div class="btn-metin">Kitap / Akvaryum Okut <span>Görsele tut, balığı tanı</span></div>
      </a>
      <a href="quiz.html" class="btn btn-quiz">
        <span class="btn-ikon">🐠</span>
        <div class="btn-metin">Quiz <span>Balıkları ne kadar tanıyorsun?</span></div>
      </a>
    </div>

    <p class="alt-yazi">ELSAM — Elazığ Su Ürünleri Araştırma Enstitüsü</p>
  </body>
</html>
