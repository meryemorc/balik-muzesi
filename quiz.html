<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Balık Quiz 🐠</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(180deg, #001f3f 0%, #0077b6 60%, #00b4d8 100%);
      color: white;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }
    .geri {
      display: inline-block;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 16px;
      padding: 6px 12px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      transition: all 0.2s;
    }
    .geri:hover { background: rgba(255,255,255,0.15); }
    .baslik { text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 6px; }
    .alt-baslik { text-align: center; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 24px; }

    /* Kategori grid */
    #kategori-ekrani { display: block; }
    .kategori-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 440px;
      margin: 0 auto;
    }
    .kategori-btn {
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 14px;
      color: white;
      padding: 14px 8px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      font-family: inherit;
    }
    .kategori-btn:hover { background: rgba(255,255,255,0.22); transform: scale(1.03); }
    .kategori-btn .emoji { font-size: 26px; display: block; margin-bottom: 6px; }
    .tumu-btn {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, #0096c7, #023e8a);
      border-color: #90e0ef;
      padding: 16px;
      font-size: 15px;
    }

    /* Quiz ekranı */
    #quiz-ekrani { display: none; }
    .ilerleme-bar {
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      height: 6px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .ilerleme-ic {
      background: #90e0ef;
      height: 100%;
      border-radius: 10px;
      transition: width 0.4s ease;
    }
    .ilerleme-yazi { font-size: 12px; color: rgba(255,255,255,0.6); text-align: right; margin-bottom: 20px; }
    .kategori-etiketi {
      display: inline-block;
      font-size: 11px;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 3px 10px;
      margin-bottom: 12px;
      color: #90e0ef;
      font-weight: bold;
    }
    .soru {
      font-size: 17px;
      font-weight: bold;
      line-height: 1.5;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
    }
    .sik {
      display: block;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.25);
      color: white;
      padding: 13px 16px;
      border-radius: 12px;
      margin: 8px 0;
      width: 100%;
      font-size: 15px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      font-family: inherit;
    }
    .sik:hover:not(:disabled) { background: rgba(255,255,255,0.22); transform: translateX(4px); }
    .dogru { background: rgba(0,200,100,0.35) !important; border-color: #00c864 !important; }
    .yanlis { background: rgba(220,50,50,0.35) !important; border-color: #dc3232 !important; }
    .bilgi-kutusu {
      display: none;
      background: rgba(255,255,255,0.1);
      border-left: 3px solid #90e0ef;
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 12px;
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      line-height: 1.5;
    }

    /* Sonuç */
    #sonuc-ekrani { display: none; text-align: center; }
    .sonuc-daire {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0096c7, #023e8a);
      border: 4px solid #90e0ef;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin: 20px auto;
    }
    .sonuc-sayi { font-size: 36px; font-weight: bold; color: #FFD700; }
    .sonuc-toplam { font-size: 14px; color: rgba(255,255,255,0.7); }
    .sonuc-mesaj { font-size: 18px; font-weight: bold; margin: 10px 0; }
    .sonuc-alt { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 28px; }
    .tekrar-btn {
      background: linear-gradient(135deg, #0096c7, #023e8a);
      border: 2px solid #90e0ef;
      color: white; padding: 14px 32px;
      border-radius: 25px; font-size: 15px;
      font-weight: bold; cursor: pointer;
      margin: 6px; font-family: inherit; transition: all 0.2s;
    }
    .tekrar-btn:hover { transform: scale(1.05); }
    .kategori-sec-btn {
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.3);
      color: white; padding: 14px 32px;
      border-radius: 25px; font-size: 15px;
      cursor: pointer; margin: 6px;
      font-family: inherit; transition: all 0.2s;
    }
    .kategori-sec-btn:hover { background: rgba(255,255,255,0.22); }
  </style>
</head>

            bilgi: "9 uçan balık vardır. Uçan balıklar büyük göğüs yüzgeçlerini kanat gibi kullanarak su yüzeyinin üzerinde süzülür."
          }
        ]
      }

    };

    let aktifSorular = [];
    let soruIndex = 0;
    let puan = 0;
    let seciliKategori = '';

    function kategoriSec(kategori) {
      seciliKategori = kategori;
      if (kategori === 'tumu') {
        aktifSorular = [];
        Object.values(tumSorular).forEach(k => {
          k.sorular.forEach(s => aktifSorular.push({...s, kategoriAd: k.ad}));
        });
        aktifSorular.sort(() => Math.random() - 0.5);
      } else {
        aktifSorular = tumSorular[kategori].sorular.map(s => ({
          ...s, kategoriAd: tumSorular[kategori].ad
        }));
      }
      soruIndex = 0;
      puan = 0;
      document.getElementById('kategori-ekrani').style.display = 'none';
      document.getElementById('quiz-ekrani').style.display = 'block';
      document.getElementById('sonuc-ekrani').style.display = 'none';
      soruGoster();
    }

    function soruGoster() {
      if (soruIndex >= aktifSorular.length) { sonucGoster(); return; }
      const s = aktifSorular[soruIndex];
      document.getElementById('ilerleme-ic').style.width = (soruIndex / aktifSorular.length * 100) + '%';
      document.getElementById('ilerleme-yazi').textContent = `Soru ${soruIndex + 1} / ${aktifSorular.length}`;

      let html = `<div class="kategori-etiketi">${s.kategoriAd}</div>`;
      html += `<div class="soru">${soruIndex + 1}. ${s.soru}</div>`;
      s.siklar.forEach((sik, i) => {
        html += `<button class="sik" onclick="cevapla(${i})">${sik}</button>`;
      });
      html += `<div class="bilgi-kutusu" id="bilgi-kutusu">💡 ${s.bilgi}</div>`;
      document.getElementById('quiz-alani').innerHTML = html;
    }

    function cevapla(secilen) {
      const butonlar = document.querySelectorAll('.sik');
      butonlar.forEach(b => b.disabled = true);
      const s = aktifSorular[soruIndex];
      if (secilen === s.dogru) { butonlar[secilen].classList.add('dogru'); puan++; }
      else { butonlar[secilen].classList.add('yanlis'); butonlar[s.dogru].classList.add('dogru'); }
      document.getElementById('bilgi-kutusu').style.display = 'block';
      setTimeout(() => { soruIndex++; soruGoster(); }, 2200);
    }

    function sonucGoster() {
      document.getElementById('quiz-ekrani').style.display = 'none';
      document.getElementById('sonuc-ekrani').style.display = 'block';
      document.getElementById('sonuc-sayi').textContent = puan;
      document.getElementById('sonuc-toplam').textContent = `/ ${aktifSorular.length}`;
      const oran = puan / aktifSorular.length;
      let mesaj, alt;
      if (oran === 1)       { mesaj = "🏆 Mükemmel! Tam puan!"; alt = "Sen gerçek bir deniz biyoloğusun!"; }
      else if (oran >= 0.75){ mesaj = "🌟 Harika! Çok iyisin!"; alt = "Balıklar hakkında ciddi bilgi sahibisin."; }
      else if (oran >= 0.5) { mesaj = "👍 Fena değil!"; alt = "Biraz daha çalışırsan mükemmel olursun."; }
      else                  { mesaj = "🐟 Denizleri daha çok keşfet!"; alt = "Tekrar dene, her seferinde daha iyisin!"; }
      document.getElementById('sonuc-mesaj').textContent = mesaj;
      document.getElementById('sonuc-alt').textContent = alt;
    }

    function tekrarOyna() { kategoriSec(seciliKategori); }
    function kategoriEkraniGoster() {
      document.getElementById('kategori-ekrani').style.display = 'block';
      document.getElementById('quiz-ekrani').style.display = 'none';
      document.getElementById('sonuc-ekrani').style.display = 'none';
    }
  </script>
</body>
</html>
