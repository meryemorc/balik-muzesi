<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Serbest AR</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: black; }
      #kamera {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        z-index: 0;
      }
      #canvas {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 1;
      }
      #geri-btn {
        position: fixed;
        top: 16px; left: 16px;
        background: rgba(0,0,0,0.5);
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 50px;
        font-size: 14px;
        cursor: pointer;
        z-index: 999;
        text-decoration: none;
      }
      #bilgi-panel {
        display: none;
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.75);
        color: white;
        padding: 16px 24px;
        border-radius: 16px;
        text-align: center;
        z-index: 999;
        min-width: 280px;
        max-width: 340px;
        font-family: Arial, sans-serif;
      }
      #bilgi-panel h2 { font-size: 20px; margin-bottom: 6px; color: #FFD700; }
      #bilgi-panel p { font-size: 14px; line-height: 1.5; margin-bottom: 10px; }
      #bilgi-kapat {
        background: rgba(255,255,255,0.2);
        color: white;
        border: none;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 13px;
        cursor: pointer;
      }
      #ipucu {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        color: white;
        font-size: 14px;
        text-align: center;
        background: rgba(0,0,0,0.4);
        padding: 12px 20px;
        border-radius: 12px;
        z-index: 998;
        pointer-events: none;
        white-space: nowrap;
        font-family: Arial, sans-serif;
      }
    </style>
  </head>
  <body>
    <video id="kamera" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <a href="index.html" id="geri-btn">← Geri</a>
    <div id="ipucu">🐠 Balıklara dokunun, bilgi alın!</div>
    <div id="bilgi-panel">
      <h2 id="balik-adi"></h2>
      <p id="balik-bilgi"></p>
      <button id="bilgi-kapat" onclick="panelKapat()">Kapat</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
      const bilgiler = [
        { ad: "Palyaço Balığı", bilgi: "Mercan resiflerinde yaşar. Boyları 8-10 cm olur. Anemon balığı olarak da bilinir.", model: "clownfish.glb", x: -0.4, y: 0.1 },
        { ad: "Köpekbalığı", bilgi: "Açık denizlerin en güçlü avcısıdır. 400 milyon yıldan fazladır dünyada yaşamaktadır.", model: "realistic_shark.glb", x: 0.1, y: -0.1 },
        { ad: "Deniz Samuru", bilgi: "Su altı ormanlarında yaşar. Sırtüstü yüzerek uyur. En sevimli deniz memelilerinden biridir.", model: "sky_otter.glb", x: 0.5, y: 0.15 }
      ];

      // Kamerayı başlat
      const video = document.getElementById('kamera');
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
        .then(stream => { video.srcObject = stream; });

      // Three.js sahne
      const canvas = document.getElementById('canvas');
      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
      camera.position.z = 1;

      // Işık
      const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
      scene.add(ambientLight);
      const dirLight = new THREE.DirectionalLight(0xffffff, 1);
      dirLight.position.set(1, 1, 1);
      scene.add(dirLight);

      // Modelleri yükle
      const loader = new THREE.GLTFLoader();
      const modeller = [];

      bilgiler.forEach((b, i) => {
        loader.load(b.model, (gltf) => {
          const model = gltf.scene;
          model.position.set(b.x, b.y, -1);
          model.scale.set(0.15, 0.15, 0.15);
          model.userData.index = i;
          scene.add(model);
          modeller.push(model);
        });
      });

      // Yüzme animasyonu
      function animate() {
        requestAnimationFrame(animate);
        const t = Date.now() * 0.001;
        modeller.forEach((m, i) => {
          m.position.y = bilgiler[i].y + Math.sin(t + i) * 0.05;
          m.rotation.y += 0.005;
        });
        renderer.render(scene, camera);
      }
      animate();

      // Dokunma ile bilgi
      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();

      function tikla(e) {
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        mouse.x = (x / window.innerWidth) * 2 - 1;
        mouse.y = -(y / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(modeller, true);
        if (hits.length > 0) {
          let obj = hits[0].object;
          while (obj.parent && obj.userData.index === undefined) obj = obj.parent;
          const i = obj.userData.index;
          if (i !== undefined) {
            document.getElementById('balik-adi').textContent = bilgiler[i].ad;
            document.getElementById('balik-bilgi').textContent = bilgiler[i].bilgi;
            document.getElementById('bilgi-panel').style.display = 'block';
            document.getElementById('ipucu').style.display = 'none';
          }
        }
      }

      canvas.addEventListener('click', tikla);
      canvas.addEventListener('touchend', tikla);

      function panelKapat() {
        document.getElementById('bilgi-panel').style.display = 'none';
      }

      window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
      });
    </script>
  </body>
</html>
